name: my-workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  basic-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '25'
      - name: Install dependencies
        run: npm install
      - name: Workflow completed
        run: echo "Workflow completed successfully! :D"